<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FUEGO — Dashboard Operatore</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        :root {
            --primary: #ff2e00;
            --bg: #050507;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --success: #00ff88;
            --error: #ff4444;
            --text: #ffffff;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Raleway', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* BACKGROUND EFFECTS */
        .ambient-bg {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 10% 10%, rgba(255, 46, 0, 0.12), transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(42, 94, 255, 0.08), transparent 40%);
        }
        .noise { position: fixed; inset: 0; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.15; pointer-events: none; z-index: -1; }

        /* TOP BAR */
        .top-bar {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }
        .brand-logo { font-family: 'Oswald'; font-size: 1.8rem; letter-spacing: -1px; }
        .brand-logo span { color: transparent; -webkit-text-stroke: 1px white; }
        
        .btn-logout {
            display: flex; align-items: center; gap: 8px;
            color: #888; text-decoration: none; font-size: 0.8rem;
            text-transform: uppercase; font-weight: 700; transition: 0.3s;
        }
        .btn-logout:hover { color: var(--primary); }

        /* MAIN WRAPPER */
        .container {
            flex: 1;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header-section { text-align: center; margin-bottom: 40px; }
        .header-section p { color: var(--primary); text-transform: uppercase; font-weight: 700; letter-spacing: 3px; font-size: 0.7rem; margin-bottom: 10px; }
        .header-section h1 { font-family: 'Oswald'; font-size: 2.5rem; text-transform: uppercase; }

        /* OPTIONS GRID */
        .options-grid { display: grid; gap: 20px; }

        .option-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: var(--transition);
            text-align: left;
            position: relative;
            overflow: hidden;
        }
        .option-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-5px);
        }
        .option-icon {
            width: 60px; height: 60px;
            background: rgba(255, 46, 0, 0.1);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            color: var(--primary);
        }
        .option-info h2 { font-family: 'Oswald'; font-size: 1.4rem; text-transform: uppercase; margin-bottom: 4px; }
        .option-info p { font-size: 0.85rem; color: #888; line-height: 1.4; }

        /* MODALS */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: none; /* Flex via JS */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            width: 100%;
            max-width: 400px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            position: relative;
        }
        .close-btn {
            position: absolute; top: 20px; right: 20px;
            cursor: pointer; color: #666;
        }

        /* SCANNER VIEWPORT */
        .scanner-container {
            width: 100%;
            aspect-ratio: 1;
            background: #000;
            border-radius: 20px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
            border: 2px solid var(--border);
        }
        #qrVideo { width: 100%; height: 100%; object-fit: cover; }
        .scan-overlay {
            position: absolute; inset: 0;
            border: 2px solid var(--primary);
            margin: 40px;
            border-radius: 10px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);
        }
        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: var(--primary);
            top: 0; left: 0;
            box-shadow: 0 0 15px var(--primary);
            animation: scan 2s infinite linear;
        }
        @keyframes scan { 0% { top: 0% } 100% { top: 100% } }

        /* INPUT STYLING */
        .input-field {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 18px;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            font-family: 'Oswald';
            letter-spacing: 2px;
            margin: 20px 0;
        }
        .input-field:focus { outline: none; border-color: var(--primary); }

        .btn-action {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            border: none;
            border-radius: 15px;
            color: white;
            font-family: 'Oswald';
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        /* RESULT POPUP */
        .result-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .result-box.ok { background: rgba(0, 255, 136, 0.1); color: var(--success); border: 1px solid var(--success); }
        .result-box.error { background: rgba(255, 68, 68, 0.1); color: var(--error); border: 1px solid var(--error); }

    </style>
</head>
<body>

    <div class="ambient-bg"></div>
    <div class="noise"></div>

    <header class="top-bar">
        <div class="brand-logo">FUE<span>GO</span></div>
        <a href="index.html" class="btn-logout">
            <span class="material-symbols-outlined" style="font-size: 18px;">logout</span>
            Esci
        </a>
    </header>

    <main class="container">
        <div class="header-section">
            <p>Staff Control Panel</p>
            <h1>Scegli Modalità</h1>
        </div>

        <div class="options-grid">
            <div class="option-card" onclick="openModal('modalCamera')">
                <div class="option-icon">
                    <span class="material-symbols-outlined" style="font-size: 32px;">qr_code_scanner</span>
                </div>
                <div class="option-info">
                    <h2>Fotocamera</h2>
                    <p>Scansiona il QR Code del biglietto.</p>
                </div>
                <span class="material-symbols-outlined" style="margin-left: auto; color: #444;">chevron_right</span>
            </div>

            <div class="option-card" onclick="openModal('modalCode')">
                <div class="option-icon">
                    <span class="material-symbols-outlined" style="font-size: 32px;">keyboard</span>
                </div>
                <div class="option-info">
                    <h2>Codice Manuale</h2>
                    <p>Inserisci il codice FG-XXXX manualmente.</p>
                </div>
                <span class="material-symbols-outlined" style="margin-left: auto; color: #444;">chevron_right</span>
            </div>
        </div>
    </main>

    <div class="modal" id="modalCamera">
        <div class="modal-content">
            <span class="material-symbols-outlined close-btn" onclick="closeModal('modalCamera')">close</span>
            <h2 style="font-family: 'Oswald';">SCANSIONE QR</h2>
            <div class="scanner-container">
                <video id="qrVideo" autoplay playsinline muted></video>
                <div class="scan-overlay">
                    <div class="scan-line"></div>
                </div>
            </div>
            <p style="color: #888; font-size: 0.8rem;">Inquadra il codice per verificare</p>
            <div id="camResult" class="result-box"></div>
        </div>
    </div>

    <div class="modal" id="modalCode">
        <div class="modal-content">
            <span class="material-symbols-outlined close-btn" onclick="closeModal('modalCode')">close</span>
            <h2 style="font-family: 'Oswald';">INSERISCI CODICE</h2>
            <input type="text" id="ticketCode" class="input-field" placeholder="FG-0000" maxlength="10">
            <button class="btn-action" id="verifyBtn">VERIFICA ACCESSO</button>
            <div id="codeResult" class="result-box"></div>
        </div>
    </div>

    <script>
        let videoStream = null;

        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
            if(id === 'modalCamera') startCamera();
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
            if(id === 'modalCamera') stopCamera();
            // Reset results
            document.querySelectorAll('.result-box').forEach(el => el.style.display = 'none');
        }

        async function startCamera() {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                document.getElementById('qrVideo').srcObject = videoStream;
            } catch (err) {
                alert("Errore fotocamera: " + err);
            }
        }

        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }
        }

        // Simulazione Verifica
        document.getElementById('verifyBtn').addEventListener('click', () => {
            const code = document.getElementById('ticketCode').value.toUpperCase();
            const res = document.getElementById('codeResult');
            
            res.style.display = 'block';
            if(code.startsWith('FG-') && code.length >= 6) {
                res.className = "result-box ok";
                res.innerHTML = "ACCESSO CONSENTITO ✓";
            } else {
                res.className = "result-box error";
                res.innerHTML = "CODICE NON VALIDO ✕";
            }
        });

        // Gestione ESC key
        document.addEventListener('keydown', (e) => {
            if(e.key === 'Escape') {
                closeModal('modalCamera');
                closeModal('modalCode');
            }
        });
    </script>
</body>
</html>
