<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FUEGO — Area Riservata</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Raleway:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>

  <div class="bg-layer"></div>
  <div class="noise"></div>

  <div class="login-wrapper">

    <div class="login-card">

      <!-- BACK LINK -->
      <a href="index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Torna alla registrazione
      </a>

      <!-- HEADER -->
      <div class="login-header">
        <div class="lock-icon">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="9" width="18" height="12" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M6 9V6.5a5 5 0 0 1 10 0V9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="11" cy="15" r="1.5" fill="currentColor"/></svg>
        </div>
        <span class="login-eyebrow">Accesso Esclusivo</span>
        <h1 class="login-title">Area Riservata</h1>
        <p class="login-desc">Inserisci le tue credenziali per accedere.</p>
      </div>

      <!-- LOGIN FORM -->
      <div id="loginForm">

        <div class="field" id="fl-id">
          <label for="user-id">ID Utente</label>
          <input type="text" id="user-id" placeholder="es. fuego_2024" autocomplete="username" autocapitalize="none"/>
          <span class="err">Campo obbligatorio</span>
        </div>

        <div class="field" id="fl-pass">
          <label for="password">Password</label>
          <div class="pass-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
            <button class="toggle-pass" id="togglePass" type="button" tabindex="-1" aria-label="Mostra password">
              <svg id="eye-open" width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M1 9C2.5 5.5 5.5 3 9 3s6.5 2.5 8 6c-1.5 3.5-4.5 6-8 6S2.5 12.5 1 9Z" stroke="currentColor" stroke-width="1.4"/><circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.4"/></svg>
              <svg id="eye-closed" width="18" height="18" viewBox="0 0 18 18" fill="none" style="display:none"><path d="M2 2l14 14M7.5 6.5A4.5 4.5 0 0 1 9 6c3.5 0 6.5 2.5 8 6a14 14 0 0 1-2.5 3.5M5.5 5.5C3.5 6.8 2 8 1 9c1.5 3.5 4.5 6 8 6a7 7 0 0 0 3.5-.9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </button>
          </div>
          <span class="err">Campo obbligatorio</span>
        </div>

        <button class="btn-submit" id="loginBtn" type="button">
          <span class="btn-label">Accedi</span>
          <span class="btn-arrow">→</span>
        </button>

      </div>

      <!-- SUCCESS -->
      <div id="loginSuccess" class="success-view" style="display:none">
        <div class="success-badge">✓</div>
        <h3 class="success-title">Accesso Effettuato</h3>
        <p class="success-body">Benvenuto nell'area riservata.<br/>Buona serata.</p>
      </div>

    </div>

  </div>

  <script src="login.js"></script>
</body>
</html>
