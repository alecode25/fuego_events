<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sito in Manutenzione</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .maintenance-container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            background-color: #1a1a1a;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.2);
            border: 1px solid #333;
            position: relative;
        }

        /* --- SPAZIO PER IL TUO LOGO (NIENTE ROTELLE) --- */
        .logo-box {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
        }

        .logo-box img {
            max-width: 250px; /* Regola la larghezza del tuo logo qui */
            height: auto;
            display: block;
        }

        h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        h1 span {
            color: #ff3333;
        }

        p {
            font-size: 1.1rem;
            color: #cccccc;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .progress-container {
            width: 100%;
            height: 10px;
            background-color: #333;
            border-radius: 5px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 75%; 
            background-color: #ff3333;
        }

        .contact-info {
            font-size: 0.9rem;
            color: #999999;
        }

        .social-box {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-box a {
            color: #ffffff;
            font-size: 1.5rem;
            transition: color 0.3s;
        }

        .social-box a:hover {
            color: #ff3333;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }
            .logo-box img { max-width: 180px; }
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        
        <div class="logo-box">
            <img src="logo1.png" alt="Logo Fuego">
        </div>

        <h1>Sito in <span>Manutenzione</span></h1>
        
        <p>Stiamo lavorando per migliorare la tua esperienza.<br> 
           Il nostro sito tornerà online a breve.</p>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <div class="contact-info">
            Per urgenze: <strong>WhatsApp</strong>
            
            <div class="social-box">
                <a href="https://www.instagram.com/fuego_official_events/" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@staff_fuego_" target="_blank"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>

    </div>

</body>
</html>
